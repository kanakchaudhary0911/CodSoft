<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Professional Calculator</title>
  <style>
    :root {
      --bg: #111827;
      --card: #1f2937;
      --btn: #374151;
      --text: #ffffff;
      --accent: #2563eb;
      --equal: #10b981;
      --danger: #ef4444;
    }

    body.light {
      --bg: #f3f4f6;
      --card: #ffffff;
      --btn: #e5e7eb;
      --text: #111827;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: var(--text);
      transition: 0.3s;
    }

    .calculator {
      background: var(--card);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      width: 340px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .toggle {
      cursor: pointer;
      font-size: 0.9rem;
      padding: 5px 10px;
      border-radius: 8px;
      background: var(--btn);
    }

    .display {
      width: 100%;
      height: 60px;
      background: var(--bg);
      border: none;
      border-radius: 10px;
      margin-bottom: 10px;
      text-align: right;
      font-size: 1.5rem;
      padding: 10px;
      color: var(--text);
    }

    .history {
      height: 60px;
      overflow-y: auto;
      font-size: 0.8rem;
      margin-bottom: 10px;
      opacity: 0.7;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      background: var(--btn);
      color: var(--text);
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.8;
    }

    .operator { background: var(--accent); }
    .equal { background: var(--equal); grid-column: span 2; }
    .clear { background: var(--danger); }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="top-bar">
      <div>Calculator</div>
      <div class="toggle" onclick="toggleTheme()">🌗 Theme</div>
    </div>

    <div class="history" id="history"></div>
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
      <button onclick="clearDisplay()" class="clear">C</button>
      <button onclick="backspace()">⌫</button>
      <button onclick="appendValue('/')" class="operator">÷</button>
      <button onclick="appendValue('*')" class="operator">×</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button onclick="appendValue('-')" class="operator">−</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button onclick="appendValue('+')" class="operator">+</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button onclick="appendValue('.')">.</button>

      <button onclick="appendValue('0')">0</button>
      <button onclick="calculate()" class="equal">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");
    const historyBox = document.getElementById("history");

    function appendValue(val) {
      display.value += val;
    }

    function clearDisplay() {
      display.value = "";
    }

    function backspace() {
      display.value = display.value.slice(0, -1);
    }

    function calculate() {
      try {
        let expression = display.value;
        let result = eval(expression);
        historyBox.innerHTML += `<div>${expression} = ${result}</div>`;
        display.value = result;
      } catch {
        display.value = "Error";
      }
    }

    function toggleTheme() {
      document.body.classList.toggle("light");
    }

    // Keyboard Support
    document.addEventListener("keydown", (e) => {
      if (!isNaN(e.key) || ['+', '-', '*', '/', '.'].includes(e.key)) {
        appendValue(e.key);
      } else if (e.key === 'Enter') {
        calculate();
      } else if (e.key === 'Backspace') {
        backspace();
      } else if (e.key.toLowerCase() === 'c') {
        clearDisplay();
      }
    });
  </script>

</body>
</html>
